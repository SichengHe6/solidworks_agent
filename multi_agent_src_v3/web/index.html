<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multi-Agent CAD v3 Demo</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Multi-Agent CAD v3 Demo</p>
        <h1>SolidWorks Agent v3</h1>
        <p class="hero-copy">输入一句设计需求，系统会先自动补全零件明细或装配协议，再进入零件/装配的建模、校验、执行和返修流程。</p>
      </section>

      <section class="chat-panel">
        <div class="toolbar toolbar-simple">
          <div class="toolbar-stack">
            <div class="toolbar-note">
              当前模式：需求自动补全 + 零件/装配自动流水线
            </div>
            <div id="model-config" class="model-config" aria-live="polite"></div>
          </div>
        </div>

        <div id="chat-log" class="chat-log" aria-live="polite"></div>

        <form id="chat-form" class="composer">
          <textarea
            id="message-input"
            rows="4"
            placeholder="输入零件或装配需求，例如：做一个 Z=40、模数 2、带中心通孔的直齿轮..."
          ></textarea>
          <button id="send-button" type="submit">发送</button>
        </form>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
